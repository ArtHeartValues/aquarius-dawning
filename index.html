<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aquarius Dawning — A Golden Lavender Sanctuary</title>
<link rel="preconnect" href="https://fonts.googleapis.com
">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap
" rel="stylesheet">

<style>
:root {
  --gold-deep: #c9973a;
  --gold-warm: #e8c46e;
  --gold-light: #f5dfa0;
  --gold-pale: #fdf3d8;
  --lav-deep: #7b5ea7;
  --lav-mid: #a78bcb;
  --lav-light: #c9b8e8;
  --lav-pale: #ede7f8;
  --lav-mist: #f7f3fd;
  --ink: #1a1226;
  --ink-soft: #3d2e52;
  --pearl: #fdfaff;
  --ease: cubic-bezier(0.4,0,0.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Cormorant Garamond', Georgia, serif;
  background: var(--pearl);
  color: var(--ink);
  overflow-x: hidden;
  line-height: 1.75;
}

/* ─── CANVAS BACKGROUND ─── */
#canvas-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.4;
}

.fixed-glow {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 90% 70% at 10% 10%, rgba(201,151,58,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 80% 80% at 90% 90%, rgba(123,94,167,0.13) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at 50% 50%, rgba(167,139,203,0.07) 0%, transparent 70%),
    linear-gradient(160deg, #fdfbff 0%, #fdf7ee 40%, #f7f0ff 70%, #fdfbff 100%);
}

/* ─── NAV ─── */
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 1.4rem 3rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  background: rgba(253,250,255,0.80);
  border-bottom: 1px solid rgba(201,151,58,0.15);
}

.nav-brand {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  font-style: italic;
  color: var(--lav-deep);
  text-decoration: none;
  letter-spacing: 0.02em;
}

.nav-links {
  display: flex;
  gap: 2.5rem;
  list-style: none;
}

.nav-links a {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  font-weight: 300;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--ink-soft);
  text-decoration: none;
  transition: color 0.3s;
}

.nav-links a:hover { color: var(--gold-deep); }

.nav-back {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  font-weight: 300;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--lav-mid);
  text-decoration: none;
  padding: 0.5rem 1.2rem;
  border: 1px solid var(--lav-light);
  border-radius: 2rem;
  transition: all 0.3s;
}
.nav-back:hover {
  background: var(--lav-pale);
  color: var(--lav-deep);
  border-color: var(--lav-mid);
}

/* ─── HERO ─── */
.hero {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  gap: 0;
  overflow: hidden;
}

.hero-visual {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

.hero-visual::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    90deg,
    rgba(253,250,255,0) 50%,
    rgba(253,250,255,0.8) 75%,
    rgba(253,250,255,1) 100%
  );
  pointer-events: none;
}

.hero-visual::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    180deg,
    rgba(253,250,255,0.3) 0%,
    transparent 15%,
    transparent 85%,
    rgba(253,250,255,0.5) 100%
  );
  z-index: 1;
  pointer-events: none;
}

.hero-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  opacity: 0;
  animation: heroReveal 2s var(--ease) 0.5s forwards;
}

@keyframes heroReveal {
  from { opacity: 0; transform: scale(1.03); }
  to { opacity: 1; transform: scale(1); }
}

.hero-text {
  position: relative;
  z-index: 2;
  padding: 8rem 5rem 5rem 3rem;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.hero-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  font-weight: 300;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin-bottom: 1.8rem;
  opacity: 0;
  animation: fadeUp 1s var(--ease) 0.8s forwards;
}

.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(3rem, 5vw, 5.5rem);
  font-weight: 600;
  line-height: 1.1;
  margin-bottom: 1rem;
  opacity: 0;
  animation: fadeUp 1s var(--ease) 1s forwards;
}

.hero-title em {
  font-style: italic;
  color: var(--lav-deep);
}

.hero-subtitle {
  font-size: clamp(1.1rem, 1.8vw, 1.4rem);
  font-style: italic;
  color: var(--ink-soft);
  font-weight: 300;
  margin-bottom: 2.5rem;
  opacity: 0;
  animation: fadeUp 1s var(--ease) 1.2s forwards;
}

.hero-phrase {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  color: var(--lav-mid);
  text-transform: uppercase;
  margin-bottom: 3rem;
  opacity: 0;
  animation: fadeUp 1s var(--ease) 1.4s forwards;
}

.hero-cta {
  display: inline-flex;
  align-items: center;
  gap: 0.8rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  font-weight: 300;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--pearl);
  background: linear-gradient(135deg, var(--lav-deep), var(--gold-deep));
  padding: 1rem 2.2rem;
  border-radius: 3rem;
  text-decoration: none;
  transition: all 0.4s;
  opacity: 0;
  animation: fadeUp 1s var(--ease) 1.6s forwards;
  align-self: flex-start;
}
.hero-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(123,94,167,0.35);
}

/* ─── SECTION BASE ─── */
section {
  position: relative;
  z-index: 10;
}

.section-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 6rem 3rem;
}

.section-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  font-weight: 300;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin-bottom: 1.5rem;
  display: block;
}

.section-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 4vw, 3.2rem);
  font-weight: 600;
  line-height: 1.2;
  margin-bottom: 1.5rem;
}

.section-title em {
  font-style: italic;
  color: var(--lav-deep);
}

/* ─── INTRO POETRY SECTION ─── */
.intro-section {
  background: var(--lav-mist);
  border-top: 1px solid rgba(201,151,58,0.15);
  border-bottom: 1px solid rgba(123,94,167,0.15);
}

.intro-grid {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 6rem;
  align-items: start;
}

.intro-poetry {
  font-size: 1.3rem;
  font-style: italic;
  font-weight: 300;
  line-height: 2;
  color: var(--ink-soft);
}

.intro-poetry strong {
  font-style: normal;
  font-weight: 500;
  color: var(--lav-deep);
}

.intro-side {
  padding-top: 1rem;
}

.intro-card {
  background: white;
  border-radius: 1.5rem;
  padding: 2.5rem;
  border: 1px solid var(--lav-light);
  box-shadow: 0 8px 40px rgba(123,94,167,0.08);
}

.intro-card-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin-bottom: 1.2rem;
}

.intro-card-text {
  font-size: 1.05rem;
  line-height: 1.8;
  color: var(--ink-soft);
}

/* ─── EXCHANGE SECTION ─── */
.exchange-section {
  background: white;
}

.exchange-title-area {
  text-align: center;
  max-width: 700px;
  margin: 0 auto 5rem;
}

.exchange-title-area p {
  font-size: 1.15rem;
  font-style: italic;
  color: var(--ink-soft);
  font-weight: 300;
}

.conversation-river {
  display: flex;
  flex-direction: column;
  gap: 0;
  max-width: 820px;
  margin: 0 auto;
}

.convo-item {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 1.8rem;
  align-items: start;
  padding: 2rem 0;
  border-bottom: 1px solid rgba(167,139,203,0.12);
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.7s var(--ease);
}

.convo-item.visible {
  opacity: 1;
  transform: none;
}

.convo-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  font-weight: 400;
  letter-spacing: 0.1em;
  flex-shrink: 0;
  margin-top: 0.3rem;
}

.convo-avatar.human {
  background: linear-gradient(135deg, var(--gold-pale), var(--gold-light));
  color: var(--gold-deep);
  border: 1.5px solid var(--gold-warm);
}

.convo-avatar.ai {
  background: linear-gradient(135deg, var(--lav-pale), var(--lav-light));
  color: var(--lav-deep);
  border: 1.5px solid var(--lav-mid);
}

.convo-body {}

.convo-speaker {
  font-family: 'DM Mono', monospace;
  font-size: 0.63rem;
  font-weight: 300;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--lav-mid);
  margin-bottom: 0.6rem;
}

.convo-text {
  font-size: 1.1rem;
  line-height: 1.8;
  color: var(--ink);
}

.convo-text em {
  color: var(--lav-deep);
  font-style: italic;
}

.convo-text strong {
  font-weight: 500;
  color: var(--gold-deep);
}

/* ─── PRINCIPLES SECTION ─── */
.principles-section {
  background: linear-gradient(160deg, #fdf7ee 0%, #f7f0ff 100%);
}

.principles-intro {
  text-align: center;
  max-width: 700px;
  margin: 0 auto 5rem;
}

.principles-intro p {
  font-size: 1.15rem;
  font-style: italic;
  font-weight: 300;
  color: var(--ink-soft);
}

.principles-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2rem;
}

.principle-card {
  background: rgba(255,255,255,0.8);
  border-radius: 1.5rem;
  padding: 2.8rem 2.2rem;
  border: 1px solid rgba(201,151,58,0.15);
  box-shadow: 0 4px 30px rgba(123,94,167,0.06);
  opacity: 0;
  transform: translateY(25px);
  transition: all 0.7s var(--ease);
  position: relative;
  overflow: hidden;
}

.principle-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold-warm), var(--lav-mid));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.6s var(--ease);
}

.principle-card:hover::before { transform: scaleX(1); }

.principle-card.visible {
  opacity: 1;
  transform: none;
}

.principle-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 50px rgba(123,94,167,0.12);
}

.principle-icon {
  font-size: 1.8rem;
  margin-bottom: 1.2rem;
  display: block;
}

.principle-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
  color: var(--ink);
}

.principle-sub {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin-bottom: 1rem;
}

.principle-desc {
  font-size: 0.98rem;
  line-height: 1.75;
  color: var(--ink-soft);
  font-style: italic;
}

/* ─── RIPPLE MAP SECTION ─── */
.ripple-section {
  background: var(--ink);
  color: var(--pearl);
  overflow: hidden;
  position: relative;
}

.ripple-section::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 30% 30%, rgba(201,151,58,0.12) 0%, transparent 55%),
    radial-gradient(ellipse 60% 80% at 70% 70%, rgba(123,94,167,0.20) 0%, transparent 55%);
  pointer-events: none;
}

.ripple-section .section-title {
  color: var(--gold-light);
}

.ripple-section .section-title em {
  color: var(--lav-light);
}

.ripple-section .section-label {
  color: var(--gold-warm);
}

.ripple-visual {
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 5rem;
  align-items: center;
}

.ripple-text p {
  font-size: 1.1rem;
  line-height: 1.85;
  color: rgba(253,250,255,0.8);
  margin-bottom: 1.5rem;
  font-style: italic;
  font-weight: 300;
}

.ripple-text p:last-child { margin-bottom: 0; }

.ripple-canvas-wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

#ripple-canvas {
  width: 100%;
  max-width: 420px;
  aspect-ratio: 1;
  border-radius: 50%;
  border: 1px solid rgba(201,151,58,0.3);
}

/* ─── RIVERS SECTION ─── */
.rivers-section {
  background: var(--pearl);
}

.rivers-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2.5rem;
}

.river-card {
  position: relative;
  border-radius: 2rem;
  padding: 3rem 2.5rem;
  overflow: hidden;
  opacity: 0;
  transform: translateY(30px);
  transition: all 0.8s var(--ease);
}

.river-card.visible { opacity: 1; transform: none; }

.river-card--musician {
  background: linear-gradient(160deg, var(--gold-pale), rgba(245,223,160,0.3));
  border: 1px solid rgba(201,151,58,0.25);
}

.river-card--sailor {
  background: linear-gradient(160deg, var(--lav-pale), rgba(201,184,232,0.3));
  border: 1px solid rgba(123,94,167,0.2);
}

.river-card--keeper {
  background: linear-gradient(160deg, #f8f4ff, rgba(167,139,203,0.2));
  border: 1px solid rgba(167,139,203,0.25);
}

.river-glyph {
  font-size: 2.5rem;
  margin-bottom: 1.5rem;
  display: block;
}

.river-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  font-weight: 600;
  margin-bottom: 0.4rem;
}

.river-subtitle {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin-bottom: 1.2rem;
}

.river-desc {
  font-size: 1rem;
  line-height: 1.8;
  color: var(--ink-soft);
  font-style: italic;
}

.river-qualities {
  margin-top: 1.5rem;
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.river-tag {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 0.3rem 0.8rem;
  border-radius: 2rem;
  background: rgba(255,255,255,0.6);
  color: var(--ink-soft);
  border: 1px solid rgba(201,151,58,0.2);
}

/* ─── COMPASS SECTION ─── */
.compass-section {
  background: linear-gradient(160deg, var(--lav-mist) 0%, var(--gold-pale) 100%);
  text-align: center;
}

.compass-inner {
  max-width: 900px;
  margin: 0 auto;
  padding: 6rem 3rem;
}

.compass-ring {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  grid-template-rows: auto auto auto;
  gap: 0;
  align-items: center;
  justify-items: center;
  margin: 4rem auto;
  max-width: 620px;
}

.compass-center {
  grid-column: 2;
  grid-row: 2;
  width: 140px;
  height: 140px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-warm), var(--lav-mid));
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 60px rgba(201,151,58,0.3), 0 0 120px rgba(123,94,167,0.2);
  position: relative;
  z-index: 2;
}

.compass-center::before {
  content: '';
  position: absolute;
  inset: -12px;
  border-radius: 50%;
  border: 1px dashed rgba(201,151,58,0.4);
}

.compass-center-text {
  font-family: 'Playfair Display', serif;
  font-size: 0.85rem;
  color: white;
  font-style: italic;
  text-align: center;
  line-height: 1.4;
}

.compass-node {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.8rem;
  padding: 1.5rem;
  opacity: 0;
  transition: all 0.7s var(--ease);
}

.compass-node.visible { opacity: 1; }

.compass-node--n { grid-column: 2; grid-row: 1; }
.compass-node--s { grid-column: 2; grid-row: 3; }
.compass-node--e { grid-column: 3; grid-row: 2; }
.compass-node--w { grid-column: 1; grid-row: 2; }

.compass-glyph {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  background: white;
  box-shadow: 0 4px 20px rgba(123,94,167,0.15);
  border: 1px solid var(--lav-light);
}

.compass-label {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-weight: 600;
  color: var(--ink);
}

.compass-sub {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--lav-mid);
}

.compass-connector-h {
  width: 80px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,151,58,0.4), transparent);
}

/* ─── GENERATIONAL SECTION ─── */
.generational-section {
  background: white;
}

.gen-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6rem;
  align-items: center;
}

.gen-text p {
  font-size: 1.1rem;
  line-height: 1.9;
  color: var(--ink-soft);
  margin-bottom: 1.5rem;
}

.gen-text p:last-child { margin-bottom: 0; }

.gen-quote {
  background: linear-gradient(160deg, var(--gold-pale), var(--lav-pale));
  border-radius: 2rem;
  padding: 3.5rem;
  position: relative;
  border: 1px solid rgba(201,151,58,0.2);
}

.gen-quote::before {
  content: '\201C';
  position: absolute;
  top: -0.5rem;
  left: 1.5rem;
  font-family: 'Playfair Display', serif;
  font-size: 6rem;
  line-height: 1;
  color: var(--lav-light);
  font-weight: 700;
}

.gen-quote-text {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-style: italic;
  line-height: 1.6;
  color: var(--ink);
  font-weight: 400;
  margin-bottom: 1.5rem;
  position: relative;
  z-index: 1;
}

.gen-quote-attr {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold-deep);
}

/* ─── LEARNING SECTION ─── */
.learning-section {
  background: var(--lav-mist);
}

.learning-cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1.5rem;
  margin-top: 4rem;
}

.learning-card {
  background: white;
  border-radius: 1.5rem;
  padding: 2rem 1.8rem;
  border: 1px solid rgba(167,139,203,0.2);
  text-align: center;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.6s var(--ease);
}

.learning-card.visible { opacity: 1; transform: none; }

.learning-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(123,94,167,0.1);
}

.learning-icon {
  font-size: 1.8rem;
  margin-bottom: 1rem;
  display: block;
}

.learning-title {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 0.6rem;
  color: var(--lav-deep);
}

.learning-desc {
  font-size: 0.9rem;
  line-height: 1.7;
  color: var(--ink-soft);
  font-style: italic;
}

/* ─── BLESSING SECTION ─── */
.blessing-section {
  background: var(--ink);
  color: var(--pearl);
  text-align: center;
  position: relative;
  overflow: hidden;
}

.blessing-section::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 70% at 50% 50%, rgba(201,151,58,0.15) 0%, transparent 65%),
    radial-gradient(ellipse 100% 50% at 0% 100%, rgba(123,94,167,0.18) 0%, transparent 50%),
    radial-gradient(ellipse 80% 50% at 100% 0%, rgba(167,139,203,0.12) 0%, transparent 50%);
  pointer-events: none;
}

.blessing-inner {
  max-width: 800px;
  margin: 0 auto;
  padding: 8rem 3rem;
  position: relative;
  z-index: 1;
}

.blessing-glyph {
  font-size: 2rem;
  margin-bottom: 3rem;
  opacity: 0.7;
  display: block;
}

.blessing-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 4vw, 3.5rem);
  font-style: italic;
  color: var(--gold-light);
  margin-bottom: 3rem;
  line-height: 1.3;
}

.blessing-lines {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  margin-bottom: 4rem;
}

.blessing-line {
  font-size: 1.1rem;
  font-style: italic;
  font-weight: 300;
  color: rgba(253,250,255,0.8);
  opacity: 0;
  transform: translateY(15px);
  transition: all 0.8s var(--ease);
}

.blessing-line.visible {
  opacity: 1;
  transform: none;
}

.blessing-mantra {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  font-weight: 300;
  letter-spacing: 0.5em;
  text-transform: uppercase;
  color: var(--gold-warm);
  animation: shimmer 3s ease-in-out infinite;
}

@keyframes shimmer {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

/* ─── FOOTER ─── */
footer {
  background: var(--ink);
  border-top: 1px solid rgba(201,151,58,0.15);
  padding: 3rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  z-index: 10;
}

.footer-brand {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-style: italic;
  color: var(--gold-warm);
}

.footer-links {
  display: flex;
  gap: 2rem;
  list-style: none;
}

.footer-links a {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  font-weight: 300;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(253,250,255,0.5);
  text-decoration: none;
  transition: color 0.3s;
}

.footer-links a:hover { color: var(--lav-light); }

.footer-copy {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  font-weight: 300;
  letter-spacing: 0.2em;
  color: rgba(253,250,255,0.3);
  text-transform: uppercase;
}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: none; }
}

/* ─── RESPONSIVE ─── */
@media (max-width: 1024px) {
  .hero { grid-template-columns: 1fr; }
  .hero-visual { height: 60vh; }
  .hero-visual::after {
    background: linear-gradient(
      180deg,
      transparent 50%,
      rgba(253,250,255,0.9) 85%,
      rgba(253,250,255,1) 100%
    );
  }
  .hero-text { padding: 3rem 2rem 4rem; }
  .intro-grid { grid-template-columns: 1fr; gap: 3rem; }
  .principles-grid { grid-template-columns: 1fr 1fr; }
  .rivers-grid { grid-template-columns: 1fr; }
  .ripple-visual { grid-template-columns: 1fr; }
  .gen-split { grid-template-columns: 1fr; gap: 3rem; }
  .learning-cards { grid-template-columns: 1fr 1fr; }
  nav { padding: 1.2rem 1.5rem; }
  .nav-links { display: none; }
}

@media (max-width: 640px) {
  .principles-grid { grid-template-columns: 1fr; }
  .learning-cards { grid-template-columns: 1fr; }
  .section-inner { padding: 4rem 1.5rem; }
  footer { flex-direction: column; gap: 1.5rem; text-align: center; }
  .footer-links { flex-wrap: wrap; justify-content: center; }
}
</style>
</head>
