<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aquarius Dawning \u2014 A Living Sanctuary</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=Libre+Baskerville:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --gold:#c8a96e;--gold-s:#e8d5a8;--gold-f:#f7f0e0;
  --lav:#9b8fb4;--lav-s:#c4bdd8;--lav-f:#edeaf4;
  --tide:#6e9fb0;--tide-s:#a8c8d4;
  --dusk:#3d3552;--dusk-d:#261f38;--dusk-m:#52496b;
  --cream:#faf7f2;--white:#ffffff;
  --body:#3d3045;--soft:#7a6e88;--faint:#b0a4bc;
  --serif:'Cormorant Garamond',Georgia,serif;
  --body-font:'Libre Baskerville',Georgia,serif;
  --mono:'DM Mono',monospace;
  --ease:cubic-bezier(.25,.46,.45,.94);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{background:var(--cream);color:var(--body);font-family:var(--body-font);line-height:1.75;overflow-x:hidden;min-height:100vh}

/* \u2500\u2500 AURORA BG \u2500\u2500 */
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 90% 60% at 10% 15%,rgba(200,169,110,.09),transparent 65%),
             radial-gradient(ellipse 70% 55% at 88% 80%,rgba(155,143,180,.11),transparent 60%),
             radial-gradient(ellipse 55% 45% at 50% 50%,rgba(255,255,255,.05),transparent 70%),
             var(--cream);
  animation:breathe 20s ease-in-out infinite alternate}
@keyframes breathe{0%{opacity:1}50%{opacity:.75}100%{opacity:1}}

/* \u2500\u2500 NAV \u2500\u2500 */
nav{position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;justify-content:space-between;align-items:center;
  padding:1.1rem 2.5rem;
  background:rgba(250,247,242,.88);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(200,169,110,.18);
  transition:padding .3s var(--ease)}
.nav-logo{font-family:var(--serif);font-weight:300;font-size:1rem;
  letter-spacing:.08em;color:var(--dusk);text-decoration:none}
.nav-logo span{color:var(--gold)}
.nav-links{display:flex;gap:1.8rem;list-style:none}
.nav-links a{font-family:var(--mono);font-size:.68rem;letter-spacing:.14em;
  text-transform:uppercase;color:var(--soft);text-decoration:none;
  transition:color .2s;padding-bottom:2px;border-bottom:1px solid transparent}
.nav-links a:hover{color:var(--lav);border-bottom-color:var(--lav-s)}
.progress-bar{position:fixed;top:0;left:0;height:2px;z-index:300;width:0%;
  background:linear-gradient(90deg,var(--gold),var(--lav));transition:width .1s linear}

/* \u2500\u2500 LAYOUT \u2500\u2500 */
.wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:0 2rem}

/* \u2500\u2500 HERO \u2500\u2500 */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;
  padding-top:5rem;padding-bottom:3rem}
.eyebrow{font-family:var(--mono);font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;
  color:var(--gold);margin-bottom:1.6rem;animation:up 1.1s var(--ease) .2s both}
.hero h1{font-family:var(--serif);font-size:clamp(3rem,8vw,5.8rem);font-weight:300;
  line-height:1.06;color:var(--dusk-d);animation:up 1.1s var(--ease) .35s both}
.hero h1 em{font-style:italic;color:var(--lav)}
.hero-sub{font-family:var(--serif);font-size:clamp(1rem,2.2vw,1.35rem);font-weight:300;
  font-style:italic;color:var(--soft);margin-top:1.2rem;max-width:560px;
  animation:up 1.1s var(--ease) .5s both}
.hero-quote{margin-top:2.4rem;padding:1.2rem 1.8rem;border-left:3px solid var(--gold);
  background:rgba(200,169,110,.06);max-width:540px;animation:up 1.1s var(--ease) .65s both}
.hero-quote p{font-family:var(--serif);font-size:1.1rem;font-style:italic;
  color:var(--dusk);line-height:1.85}
.hero-btns{display:flex;gap:1rem;margin-top:2.8rem;flex-wrap:wrap;
  animation:up 1.1s var(--ease) .8s both}
.btn{display:inline-flex;align-items:center;gap:.5em;padding:.8rem 1.8rem;
  font-family:var(--mono);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;
  text-decoration:none;border:1px solid;transition:all .3s;cursor:pointer}
.btn-dark{background:var(--dusk-d);color:var(--gold-s);border-color:var(--dusk-d)}
.btn-dark:hover{background:var(--lav);border-color:var(--lav);color:#fff}
.btn-outline{background:transparent;color:var(--soft);border-color:var(--lav-s)}
.btn-outline:hover{background:var(--lav-f);border-color:var(--lav);color:var(--lav)}
.moon-float{display:block;width:44px;height:44px;margin:3.5rem auto 0;
  animation:up 1s var(--ease) 1s both,float 6s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* \u2500\u2500 SHARED SECTION \u2500\u2500 */
section{padding:5.5rem 0}
.s-label{font-family:var(--mono);font-size:.65rem;letter-spacing:.22em;
  text-transform:uppercase;color:var(--gold);margin-bottom:1.1rem}
.s-title{font-family:var(--serif);font-size:clamp(1.9rem,4.5vw,3.2rem);
  font-weight:300;line-height:1.15;color:var(--dusk-d);margin-bottom:1.4rem}
.s-title em{font-style:italic;color:var(--lav)}
.s-intro{font-size:.95rem;color:var(--soft);max-width:600px;line-height:1.85;margin-bottom:2.5rem}
.divider{width:72px;height:1px;background:linear-gradient(90deg,var(--gold),var(--lav));margin:2.8rem 0}

/* \u2500\u2500 REVEAL \u2500\u2500 */
.reveal{opacity:0;transform:translateY(18px);transition:opacity .75s var(--ease),transform .75s var(--ease)}
.reveal.in{opacity:1;transform:none}

/* \u2500\u2500 SANCTUARY \u2014 main AI chat \u2500\u2500 */
#sanctuary{background:transparent}
.chat-shell{border:1px solid rgba(200,169,110,.22);background:rgba(255,255,255,.6);
  backdrop-filter:blur(12px);overflow:hidden}
.chat-header{padding:1.2rem 1.6rem;border-bottom:1px solid rgba(200,169,110,.15);
  display:flex;align-items:center;gap:.8rem}
.chat-dot{width:8px;height:8px;border-radius:50%}
.dot1{background:var(--gold)}
.dot2{background:var(--lav)}
.dot3{background:var(--tide)}
.chat-title{font-family:var(--mono);font-size:.7rem;letter-spacing:.18em;
  text-transform:uppercase;color:var(--soft)}
.chat-messages{height:380px;overflow-y:auto;padding:1.6rem;
  display:flex;flex-direction:column;gap:1.2rem;scroll-behavior:smooth}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-track{background:transparent}
.chat-messages::-webkit-scrollbar-thumb{background:var(--lav-s);border-radius:2px}

/* message bubbles */
.msg{display:flex;gap:.8rem;align-items:flex-start;animation:up .5s var(--ease) both}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:.75rem}
.msg.ai .msg-avatar{background:linear-gradient(135deg,var(--gold-f),var(--lav-f));
  border:1px solid var(--lav-s);color:var(--lav);font-family:var(--serif)}
.msg.user .msg-avatar{background:linear-gradient(135deg,var(--lav-f),var(--gold-f));
  border:1px solid var(--gold-s);color:var(--gold);font-family:var(--serif)}
.msg-bubble{max-width:75%;padding:1rem 1.3rem;line-height:1.75;font-size:.9rem}
.msg.ai .msg-bubble{background:rgba(237,234,244,.55);border-radius:2px 14px 14px 14px;
  color:var(--dusk);border:1px solid rgba(155,143,180,.15)}
.msg.user .msg-bubble{background:rgba(247,240,224,.7);border-radius:14px 2px 14px 14px;
  color:var(--dusk);border:1px solid rgba(200,169,110,.2);text-align
